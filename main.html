<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">

  <label for="name">Name</label>
  <input type="text" name="name" id="name" required />

  <label for="email">Email</label>
  <input type="email" name="email" id="email" required />

  <label for="male">Male</label>
  <input type="radio" id="male" name="gender" value="male" required />

  <label for="female">Female</label>
  <input type="radio" id="female" name="gender" value="female" required />

  <label for="cars">Car Brands</label>
  <select id="cars" name="cars" required>
    <option value="">Select Car</option>
    <option value="bmw">BMW</option>
    <option value="audi">Audi</option>
  </select>

  <label for="carage">Car Age</label>
  <input type="number" name="carage" id="carage" required />

  <label for="dop">Date of Purchase (dop)</label>
  <input type="date" name="dop" id="dop" required />

  <label for="password">Password</label>
  <input type="password" name="password" id="password" required />

  <button type="submit">Submit</button>

</form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
